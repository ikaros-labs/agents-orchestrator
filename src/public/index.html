<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agents Orchestrator</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header><h1>Agents Orchestrator</h1></header>
<div class="create-form">
  <div class="prompt-area">
    <textarea id="prompt" placeholder="Enter a prompt for the agent..." rows="3"></textarea>
    <div class="image-attach-area">
      <label class="attach-btn" for="image-input" title="Attach images">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Attach Images
      </label>
      <input type="file" id="image-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple style="display:none">
      <div id="image-previews" class="image-previews"></div>
    </div>
  </div>
  <div class="form-right">
    <input type="text" id="tools" value="Read, Edit, Glob, Write, Grep, WebSearch, WebFetch, AskUserQuestion" placeholder="Tools (comma-separated)">
    <input type="text" id="cwd" placeholder="Working directory (optional)">
    <button id="submit-btn" onclick="submitJob()">Run Agent</button>
  </div>
</div>
<div class="main">
  <div class="job-list" id="job-list"><div class="job-list-empty">No jobs yet</div></div>
  <div class="detail" id="detail"><div class="detail-empty">Select a job to see details</div></div>
</div>
<script src="/app.js"></script>
</body>
</html>
