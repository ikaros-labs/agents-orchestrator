<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agents Orchestrator</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header"></div>
    <div class="session-list" id="session-list"><div class="session-list-empty">No sessions yet</div></div>
  </div>
  <div id="new-task-panel" class="new-task-panel">
    <h1 class="new-task-heading">Agents Orchestrator</h1>
    <div class="new-task-form">
      <div class="prompt-area">
        <textarea id="prompt" placeholder="Enter a prompt for the agent..." rows="4"></textarea>
        <div class="image-attach-area">
          <label class="attach-btn" for="image-input" title="Attach files">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            Attach Files
          </label>
          <input type="file" id="image-input" accept="image/png,image/jpeg,image/gif,image/webp,application/pdf,text/plain,text/html,text/csv,text/xml" multiple style="display:none">
          <div id="image-previews" class="image-previews"></div>
        </div>
      </div>
      <div class="cwd-picker" id="cwd-picker" onclick="openFolderBrowser()">
        <span class="cwd-picker-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
        <span class="cwd-picker-text" id="cwd-picker-text">Working directory (optional)</span>
        <span class="cwd-picker-clear" id="cwd-picker-clear" onclick="clearCwdSelection(event)" style="display:none">&times;</span>
      </div>
      <input type="hidden" id="cwd-value">
      <label class="worktree-label">
        <input type="checkbox" id="use-worktree" checked> Use worktree
      </label>
      <div class="form-selectors-row">
        <div class="mode-selector" id="model-selector">
          <button class="mode-btn" data-model="claude-haiku-4-5-20251001" onclick="setModel('claude-haiku-4-5-20251001')">Haiku</button>
          <button class="mode-btn active" data-model="claude-sonnet-4-6" onclick="setModel('claude-sonnet-4-6')">Sonnet</button>
          <button class="mode-btn" data-model="claude-opus-4-6" onclick="setModel('claude-opus-4-6')">Opus</button>
        </div>
        <div class="mode-selector" id="effort-selector">
          <button class="mode-btn" data-effort="low" onclick="setEffort('low')">Low</button>
          <button class="mode-btn" data-effort="medium" onclick="setEffort('medium')">Mid</button>
          <button class="mode-btn active" data-effort="high" onclick="setEffort('high')">High</button>
          <button class="mode-btn" data-effort="max" onclick="setEffort('max')">Max</button>
        </div>
      </div>
      <div class="form-selectors-row">
        <div class="mode-selector" id="mode-selector">
          <button class="mode-btn active" data-mode="auto" onclick="setMode('auto')">Auto</button>
          <button class="mode-btn" data-mode="plan" onclick="setMode('plan')">Plan</button>
          <button class="mode-btn" data-mode="edit" onclick="setMode('edit')">Edit</button>
        </div>
        <div class="mode-selector" id="sandbox-selector">
          <button class="mode-btn" data-sandbox="none" onclick="setSandbox('none')">No sandbox</button>
          <button class="mode-btn active" data-sandbox="sandbox" onclick="setSandbox('sandbox')">Sandbox</button>
          <button class="mode-btn" data-sandbox="docker" onclick="setSandbox('docker')">Docker</button>
          <button class="mode-btn" data-sandbox="yolo" onclick="setSandbox('yolo')">Yolo</button>
        </div>
      </div>
      <div class="form-submit-row">
        <button id="submit-btn" onclick="submitJob()">Run Agent</button>
      </div>
    </div>
  </div>
  <div class="detail hidden" id="detail"><div class="detail-empty">Select a session to see details</div></div>
</div>
<div class="folder-modal-overlay" id="folder-modal-overlay" style="display:none">
  <div class="folder-modal">
    <div class="folder-modal-header">
      <span class="folder-modal-title">Select Working Directory</span>
      <button class="folder-modal-close" onclick="closeFolderBrowser()">&times;</button>
    </div>
    <div class="folder-modal-breadcrumb" id="folder-breadcrumb"></div>
    <div class="folder-modal-quick-picks" id="folder-quick-picks"></div>
    <div class="folder-modal-list" id="folder-list"></div>
    <div class="folder-modal-footer">
      <button class="folder-modal-new-btn" onclick="createNewFolder()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Folder
      </button>
      <div class="folder-modal-actions">
        <button class="folder-modal-cancel" onclick="closeFolderBrowser()">Cancel</button>
        <button class="folder-modal-ok" id="folder-modal-ok" onclick="confirmFolderSelection()">Open</button>
      </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
