<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agents Orchestrator</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/@codemirror/state@6",
    "@codemirror/view": "https://esm.sh/@codemirror/view@6",
    "@codemirror/language": "https://esm.sh/@codemirror/language@6",
    "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6",
    "@codemirror/lang-json": "https://esm.sh/@codemirror/lang-json@6",
    "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@6",
    "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html@6",
    "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6",
    "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6",
    "@codemirror/lang-rust": "https://esm.sh/@codemirror/lang-rust@6",
    "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6",
    "@codemirror/legacy-modes/mode/shell": "https://esm.sh/@codemirror/legacy-modes@0/mode/shell",
    "@codemirror/legacy-modes/mode/yaml": "https://esm.sh/@codemirror/legacy-modes@0/mode/yaml"
  }
}
</script>
<script type="module" src="/editor.js"></script>
</head>
<body>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header"></div>
    <div class="session-list" id="session-list"><div class="session-list-empty">No sessions yet</div></div>
  </div>
  <div id="new-task-panel" class="new-task-panel">
    <h1 class="new-task-heading">Agents Orchestrator</h1>
    <div class="new-task-form">
      <div class="prompt-area">
        <textarea id="prompt" placeholder="Enter a prompt for the agent..."></textarea>
        <div class="image-attach-area">
          <label class="attach-btn" for="image-input" title="Attach files">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            Attach Files
          </label>
          <input type="file" id="image-input" accept="image/png,image/jpeg,image/gif,image/webp,application/pdf,text/plain,text/html,text/csv,text/xml" multiple style="display:none">
          <div id="image-previews" class="image-previews"></div>
        </div>
      </div>
      <div class="cwd-row">
        <select id="cwd-select" onchange="onCwdSelectChange()">
          <option value="">Working directory (optional)</option>
          <option value="__new__">＋ Browse…</option>
        </select>
        <button id="git-sync-btn" class="git-sync-btn" style="display:none" onclick="gitSync()" title="Pull &amp; push">
          <svg class="git-sync-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 2v4h4"/><path d="M13.5 14v-4h-4"/><path d="M2.67 5.94A6 6 0 0 1 13.3 4.22l.2.18"/><path d="M13.33 10.06A6 6 0 0 1 2.7 11.78l-.2-.18"/></svg>
          <span id="git-sync-label">Sync</span>
        </button>
      </div>
      <span id="git-sync-error" class="git-sync-error"></span>
      <label class="worktree-label">
        <input type="checkbox" id="use-worktree" checked> Use worktree
      </label>
      <div class="form-selectors-row">
        <div class="mode-selector" id="model-selector">
          <button class="mode-btn" data-model="claude-haiku-4-5-20251001" onclick="setModel('claude-haiku-4-5-20251001')">Haiku</button>
          <button class="mode-btn active" data-model="claude-sonnet-4-6" onclick="setModel('claude-sonnet-4-6')">Sonnet</button>
          <button class="mode-btn" data-model="claude-opus-4-6" onclick="setModel('claude-opus-4-6')">Opus</button>
        </div>
        <div class="mode-selector" id="effort-selector">
          <button class="mode-btn" data-effort="low" onclick="setEffort('low')">Low</button>
          <button class="mode-btn" data-effort="medium" onclick="setEffort('medium')">Mid</button>
          <button class="mode-btn active" data-effort="high" onclick="setEffort('high')">High</button>
          <button class="mode-btn" data-effort="max" onclick="setEffort('max')">Max</button>
        </div>
      </div>
      <div class="form-selectors-row">
        <div class="mode-selector" id="mode-selector">
          <button class="mode-btn active" data-mode="plan" onclick="setMode('plan')">Plan</button>
          <button class="mode-btn" data-mode="edit" onclick="setMode('edit')">Edit</button>
        </div>
        <div class="mode-selector" id="sandbox-selector">
          <button class="mode-btn" data-sandbox="none" onclick="setSandbox('none')">No sandbox</button>
          <button class="mode-btn active" data-sandbox="sandbox" onclick="setSandbox('sandbox')">Sandbox</button>
<button class="mode-btn" data-sandbox="yolo" onclick="setSandbox('yolo')">Yolo</button>
        </div>
      </div>
      <div class="form-submit-row">
        <button id="submit-btn" onclick="submitJob()">Run Agent</button>
      </div>
    </div>
  </div>
  <div class="detail hidden" id="detail"><div class="detail-empty">Select a session to see details</div></div>
</div>
<div id="folder-browser-overlay" class="fb-overlay" style="display:none" onclick="fbOverlayClick(event)">
  <div class="fb-modal">
    <div class="fb-header">
      <div class="fb-breadcrumb" id="fb-breadcrumb"></div>
      <button class="fb-close-btn" onclick="closeFolderBrowser()">&times;</button>
    </div>
    <div class="fb-list-container">
      <div class="fb-list" id="fb-list"></div>
    </div>
    <div class="fb-footer">
      <div class="fb-footer-left">
        <button class="fb-new-folder-btn" onclick="fbNewFolder()">New Folder</button>
        <label class="fb-hidden-toggle">
          <input type="checkbox" id="fb-show-hidden" onchange="fbToggleHidden()"> Show hidden
        </label>
      </div>
      <div class="fb-footer-right">
        <button class="fb-cancel-btn" onclick="closeFolderBrowser()">Cancel</button>
        <button class="fb-select-btn" onclick="fbSelectFolder()">Select Folder</button>
      </div>
    </div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
